# Local full stack (no Traefik/TLS). Requires Docker Desktop (or Engine) running.
#
#   docker compose -f docker-compose.local.yml up --build
#
# UI: http://localhost:3000   API: http://localhost:8000/api/v1
# Multi-tenant: GET /api/v1/tenants — send header X-Tenant-Id: <uuid> to scope data (default tenant if omitted).
# Postgres + OpenSearch are internal; LLM defaults to host Ollama at host.docker.internal:11434.
# Optional: create a .env next to this file with OLLAMA_MODEL=<name from `ollama list`> if not using default llama3.
# RAG index (/chat/index): ollama pull nomic-embed-text (or set OLLAMA_EMBED_MODEL to another 768-dim model).
#
# Settings UI reads/writes .env at the API path /app/.env — bind-mount your repo-root .env:
#   (create an empty file with `touch .env` if needed)

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: loggator
      POSTGRES_PASSWORD: loggator
      POSTGRES_DB: loggator
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loggator"]
      interval: 5s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch_local_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 15

  migrate:
    build:
      context: ./loggator-api
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://loggator:loggator@postgres:5432/loggator
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./loggator-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://loggator:loggator@postgres:5432/loggator
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: "9200"
      OPENSEARCH_AUTH_TYPE: none
      OPENSEARCH_USE_SSL: "false"
      OPENSEARCH_VERIFY_CERTS: "false"
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOW_ALL: "true"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      LLM_PROVIDER: ollama
    volumes:
      - ./.env:/app/.env
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./loggator-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/live
    ports:
      - "3000:3000"
    environment:
      HOSTNAME: 0.0.0.0
      API_URL: http://api:8000/api/v1
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_local_data:
  opensearch_local_data:
