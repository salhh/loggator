# NOTE: Copy .env.prod.example to .env.prod and fill in values before deploying.
# NEVER commit .env.prod to version control.

services:
  traefik:
    image: traefik:v3.0.4
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/dynamic:/dynamic:ro
      - traefik_certs:/letsencrypt
    command:
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
    env_file:
      - .env.prod
    labels:
      - "traefik.enable=true"
      # Dashboard router
      - "traefik.http.routers.traefik-dashboard.rule=Host(`${DOMAIN}`) && PathPrefix(`/traefik-admin`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=dashboard-auth@file,security-headers@file"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loggator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loggator}
      POSTGRES_DB: ${POSTGRES_DB:-loggator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loggator}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "0.5"

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u admin:${OPENSEARCH_PASSWORD} --insecure https://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 15
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "0.5"

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch:9200"]
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
      - OPENSEARCH_SSL_VERIFICATIONMODE=none
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  api:
    build:
      context: ./loggator-api
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-loggator}:${POSTGRES_PASSWORD:-loggator}@postgres:5432/${POSTGRES_DB:-loggator}
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - ENV_FILE_PATH=/app/.env.prod
    volumes:
      - ./.env.prod:/app/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/ws`))"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.middlewares=security-headers@file,websocket-headers"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.websocket-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  web:
    build:
      context: ./loggator-web
      dockerfile: Dockerfile
    environment:
      - API_URL=http://api:8000/api/v1
      - NEXT_PUBLIC_API_URL=https://${DOMAIN}/api/v1
      - NEXT_PUBLIC_WS_URL=wss://${DOMAIN}/ws/live
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.web.middlewares=security-headers@file"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ── Monitoring Stack (--profile monitoring) ──────────────────────────────
  # prometheus, grafana, alertmanager, node-exporter, loki added in Task 5

volumes:
  postgres_data:
  opensearch_data:
  traefik_certs:
